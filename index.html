<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="./src/todo.css">
</head>
<body>
  <main class="app">
    <section class="todo-card">
      <header class="todo-header">
        <div>
          <p class="eyebrow">Todo List</p>
          <h1 id="todo-title">오늘의 할 일</h1>
        </div>
        <div class="status-box">
          <span id="task-count">전체 0개</span>
        </div>
      </header>

      <form id="todo-form" class="todo-form">
        <input
          id="todo-input"
          name="todo"
          type="text"
          placeholder="할 일을 입력하세요"
          maxlength="100"
          autocomplete="off"
        >
        <button id="submit-button" type="submit">추가</button>
      </form>

      <div class="toolbar">
        <button id="reload-button" type="button" class="ghost-button">새로고침</button>
      </div>

      <ul id="todo-list" class="todo-list"></ul>

      <template id="todo-item-template">
        <li class="todo-item">
          <label class="todo-check-label">
            <input class="todo-checkbox" type="checkbox">
            <span class="checkmark"></span>
          </label>
          <span class="todo-text"></span>
          <button class="delete-button" type="button">삭제</button>
        </li>
      </template>
    </section>
  </main>

  <script src="./src/todo.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
    <main class="todo-app">
        <header class="todo-header">
            <h1>Todo List</h1>
        </header>

        <section class="todo-input-section" aria-label="Add task">
            <input
                id="new-task-input"
                type="text"
                placeholder="Add a new task..."
                aria-label="New task"
            />
            <button id="add-task-button" type="button" aria-label="Add task">+</button>
        </section>

        <section class="backend-test-section" aria-label="Backend connection test">
            <button id="backend-test-button" type="button">Test Backend Connection</button>
            <p id="backend-test-status" role="status" aria-live="polite">Not tested yet</p>
        </section>

        <section class="todo-list-section" aria-label="Task list">
            <ul id="todo-list"></ul>
        </section>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="./todo.css" />
</head>
<body>
    <main class="todo-app">
        <header class="todo-header">
            <h1>Todo List</h1>
        </header>

        <section class="todo-input-section" aria-label="Add task">
            <input
                id="new-task-input"
                type="text"
                placeholder="Add a new task..."
                aria-label="New task"
            />
            <button id="add-task-button" type="button" aria-label="Add task">+</button>
        </section>

        <section class="todo-list-section" aria-label="Task list">
            <ul id="todo-list"></ul>
        </section>
    </main>

    <script src="./todo.js" defer></script>
</body>
</html>

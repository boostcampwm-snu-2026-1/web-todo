<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="/src/todo.css" />
  </head>
  <body>
    <div class="todo-container">
      <div class="todo-title">
        <h1>Todo List</h1>
        <img src = "/image/nyancat.gif" width = "50">

      </div>
      <p class="date"> </p><!--나중에 JS로 날짜 정보 넣기-->



      <div class="todo-body"> 
        <input 
          type="text" 
          id="todo-input"
          class="todo-input" 
          placeholder="Add a new task...?" 
          autocomplete="off"
          />
      
      
        <img 
          src="/image/plus.png" 
          alt="+" 
          id="AddUpdateClick" 
          onclick="CreateToDoData()"
          />
      </div>



      <ul id="todo-list" class = "todo-list"> <!--ul 태그는 순서가 중요하지 않은 목록을 정의하는 데 사용된다--> </ul>
    </div>
    <script src="/src/todo.js"></script> 
  </body>
</html>

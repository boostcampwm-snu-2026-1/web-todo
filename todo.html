<!DOCTYPE html>
<html lang="ko"> 

<head>
    <link rel="stylesheet" href="todo.css">
    <title>TODAY'S TASK</title>
</head>

<body>
    <h1>TODAY'S TASK</h1>
    <h3>오늘의 날짜</h3>
    <div class="add-task-container">
        <input type="text" class = "add-task-input" placeholder="Add a new task...">
        <button type="button" class = "add-task-btn">➕</button>
    </div>
    
    
    <ul class = "task-list">
        <div class="task-item">
            <input type="checkbox"><span class = "task-text">1. Do the laundry</span><div><button type = "button" class = "edit-task-btn">🖋️</button><button type = "button" class = "delete-task-btn">🗑️</button></div>
        </div>
        <div class="task-item">
            <input type="checkbox"><span class = "task-text">2. Buy groceries</span><div><button type = "button" class = "edit-task-btn">🖋️</button><button type = "button" class = "delete-task-btn">🗑️</button></div>
        </div>
        <div class="task-item">
            <input type="checkbox"><span class = "task-text">3. Call the doctor</span><div><button type = "button" class = "edit-task-btn">🖋️</button><button type = "button" class = "delete-task-btn">🗑️</button></div>
        </div>
        
    </ul>
    
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo</title>
    <link rel="stylesheet" href="./todo.css" />
  </head>
  <body>
    <main class="todo-app">
      <section class="todo-card">
        <div class="title-box">
          <p class="eyebrow">simple todo</p>
          <h1>오늘 할 일</h1>
          <p class="sub-text">아주 간단하게 적고, 끝나면 체크만 하면 됩니다.</p>
        </div>

        <form id="todo-form" class="todo-form">
          <input
            id="todo-input"
            class="todo-input"
            type="text"
            placeholder="할 일을 입력하세요"
            autocomplete="off"
          />
          <button class="add-button" type="submit">추가</button>
        </form>

        <div class="todo-info">
          <strong id="todo-count">남은 할 일 0개</strong>
        </div>

        <p id="empty-message" class="empty-message">아직 할 일이 없어요.</p>
        <ul id="todo-list" class="todo-list"></ul>
      </section>
    </main>

    <script src="./todo.js"></script>
  </body>
</html>

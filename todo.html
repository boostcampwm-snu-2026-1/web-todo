<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="./todo.css">
</head>
<body>

<main class="todo-app">

    <header class="todo-header">
        <h1>Today's Tasks</h1>
        <p class="todo-date">Monday, November 13</p>
    </header>

    <section class="todo-input-section">
        <input 
            type="text"
            id="todo-input"
            placeholder="Add a new task..."
        />
        <button id="add-btn">+</button>
    </section>

    <section class="todo-list-section">
        <ul id="todo-list">

            <li class="todo-item">
                <input type="checkbox">
                <span>Quick backup task</span>
                <button class="delete-btn">🗑</button>
            </li>

            <li class="todo-item">
                <input type="checkbox">
                <span>Report Marketing Rlight</span>
                <button class="delete-btn">🗑</button>
            </li>

        </ul>
    </section>

</main>

</body>
</html>

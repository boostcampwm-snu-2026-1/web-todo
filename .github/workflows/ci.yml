name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.28.0"
      - name: Install dependencies
        run: pnpm install
      - name: Check
        run: pnpm check-all
<!DOCTYPE html>
<html>
<head>
    <meta charset = "UTF-8">
    <title>Document</title>
    <link href="todo.css" rel="stylesheet">
</head>
<body>
    <div class="div-background">
        <div class="main-title">
            <h4>Today's tasks</h4>
            <p id="today-date">today's date~~~</p>
        </div>

        <div class="main-content">
            <form class="main-form">
                <input type="text" placeholder="Add a new task..." class="input-task">
                <button class="add-task"></button>
            </form>
            <div class="error-empty">할 일을 입력해주세요.
                <button class="close-btn"></button>
            </div>
            <div class="container-box">

                <!-- task div layout -->

                <!-- <div class="div-task">
                    <form class="relative">
                        <label class="finish-task">
                            <span class="checkmark"></span>
                        </label>
                        <p class="todo-task">Example</p>
                        <button type="button" class="delete-btn">삭제</button>
                        <button type="button" class="edit-btn">편집</button>
                    </form>
                </div> -->

            </div>
        </div>
    </div> 

    <script>
        // 에러 메시지 닫기
        document.querySelector('.close-btn').addEventListener('click', function() {
            document.querySelector('.error-empty').classList.remove('show');
        });

        // 오늘 날짜 표시
        const today = new Date()
        const date = today.toLocaleDateString('ko-KR');

        const days = ['일', '월', '화', '수', '목', '금', '토'];
        const day = days[today.getDay()];

        document.querySelector('#today-date').textContent = `${date} (${day})`;

        // 할 일 추가
        const addBtn = document.querySelector('.add-task');
        const input = document.querySelector('.input-task');
        const taskContainer = document.querySelector('.container-box');
        let taskCounter = 1;

        addBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const text = input.value;

            if (text === '') {
                document.querySelector('.error-empty').classList.add('show');
                return;
            }

            document.querySelector('.error-empty').classList.remove('show');

            const taskHTML = `
                <div class="div-task" id="task${taskCounter}">
                    <form class="relative">
                        <label class="finish-task">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                        </label>
                        <p class="todo-task">${text}</p>
                        <button type="button" class="delete-btn" data-task="task${taskCounter}">삭제</button>
                        <button type="button" class="edit-btn">편집</button>
                    </form>
                </div>
            `;

            taskContainer.innerHTML += `${taskHTML}`;

            input.value = '';
            taskCounter++;
        });

        // 할 일 삭제
        taskContainer.addEventListener('click', function(e) {

            if (e.target.classList.contains('delete-btn')) {
                const taskID = e.target.dataset.task;
                document.getElementById(taskID).remove();
            }
        });
    </script>
    
</body>
</html>
